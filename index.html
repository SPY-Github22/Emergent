<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergent: Isometric Neuroevolution</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Load TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body>
    <!-- Main game canvas for isometric rendering -->
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <div id="top-bar">
            <h1>EMERGENT <span>v2.0 Alpha</span></h1>
            <div id="stats-pill">
                <span class="icon">🌍</span>
                Entities: <span id="entity-count">0</span> | FPS: <span id="fps-counter">0</span>
            </div>
        </div>
        
        <!-- Inspector Panel for Phase 9 -->
        <div id="inspector-panel" class="glass-panel">
            <div class="insp-header">
                <h3 id="insp-name">Agent Name</h3>
                <span id="insp-age">Age: 0</span>
            </div>
            <div class="stat-bar">
                <label>Health</label>
                <div class="bar-bg"><div id="insp-health" class="bar-fill" style="background: #ef4444; width: 100%;"></div></div>
            </div>
            <div class="stat-bar">
                <label>Energy</label>
                <div class="bar-bg"><div id="insp-energy" class="bar-fill" style="background: #eab308; width: 100%;"></div></div>
            </div>
        </div>
        <!-- Phase 12: Control Bar -->
        <div id="control-bar" class="glass-panel">
            <button id="btn-play-pause">⏸️ Pause</button>
            <div class="divider"></div>
            <button id="btn-speed-1x" class="active">1x</button>
            <button id="btn-speed-2x">2x</button>
            <button id="btn-speed-5x">5x</button>
            <div class="divider"></div>
            <button id="btn-save-brain">💾 Save Best</button>
            <input type="file" id="btn-load-brain" style="display: none;" accept=".json">
            <button onclick="document.getElementById('btn-load-brain').click()">📂 Load Brain</button>
        </div>
        <!-- Sandbox Menu -->
        <div id="sandbox-panel" class="glass-panel">
            <div class="panel-header">
                <h2>God Mode Settings</h2>
                <button id="btn-toggle-sandbox" class="icon-btn">⚙️</button>
            </div>
            <div class="panel-content">
                <div class="setting-group">
                    <label>Food Spawn Rate <span id="val-food-rate">5</span>/s</label>
                    <input type="range" id="slider-food-rate" min="0" max="20" value="5">
                </div>
                <div class="setting-group">
                    <label>Max Population <span id="val-pop-cap">30</span></label>
                    <input type="range" id="slider-pop-cap" min="5" max="100" value="30">
                </div>
                <div class="setting-group">
                    <label>Mutation Volatility <span id="val-mutation">10</span>%</label>
                    <input type="range" id="slider-mutation" min="1" max="100" value="10">
                </div>
            </div>
        </div>
    </div>

    <!-- Engine Scripts -->
    <script src="js/engine/ecs.js"></script>
    <script src="js/engine/components.js"></script>
    <script src="js/engine/isometric.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/terrain.js"></script>
    <script src="js/engine/pathfinding.js"></script>
    
    <!-- Game Scripts -->
    <script src="js/game.js"></script>
</body>
</html>
