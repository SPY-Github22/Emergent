<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergent: Isometric Neuroevolution</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load TensorFlow.js (needed for Overmind later) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
</head>
<body>
    <!-- Main game canvas for isometric rendering -->
    <canvas id="game-canvas"></canvas>
    
    <!-- Diegetic UI Overlay (to be expanded in Phase 4) -->

        <div id="top-bar">
            <h1>EMERGENT <span>v2.0 Alpha</span></h1>
            <div id="stats-pill">Entities: <span id="entity-count">0</span> | FPS: <span id="fps-counter">0</span></div>
        </div>
    </div>

    <!-- Engine Scripts -->
    <script src="js/engine/ecs.js"></script>
    <script src="js/engine/components.js"></script>
    <script src="js/engine/isometric.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/terrain.js"></script>
    
    <!-- Game Scripts -->
    <script src="js/game.js"></script>
</body>
</html>
