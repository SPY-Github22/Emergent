<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergent — Village AI</title>
  <meta name="description" content="A neural network observing a simulation.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- TensorFlow.js v4.22.0 -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════ -->
<!-- App shell                                   -->
<!-- ═══════════════════════════════════════════ -->
<div id="app">

  <!-- ── Header ─────────────────────────────── -->
  <header id="app-header">
    <div class="header-left">
      <span class="brand">EMERGENT</span>
    </div>
    <div class="header-center">
      <div id="whisper-bar">
        <span class="whisper-icon">🧠</span>
        <span id="whisper-text">Neural Network is observing...</span>
      </div>
    </div>
    <div class="header-right">
      <div id="training-indicator">● Idle</div>
    </div>
  </header>

  <!-- ── Main layout ────────────────────────── -->
  <div id="main-layout">

    <!-- Center: Stacked Canvas Area -->
    <main id="canvas-area">
      <div id="canvas-frame">
        <canvas id="bg-canvas" width="800" height="600"></canvas>
        <canvas id="entity-canvas" width="800" height="600"></canvas>
        <canvas id="ui-canvas" width="800" height="600"></canvas>
      </div>
    </main>

    <!-- Right: NN Dashboard -->
    <aside id="nn-dashboard" class="glass-panel">
      
      <!-- General Control -->
      <section class="panel">
        <div class="panel-title">World State</div>
        <div class="control-row">
            <button id="btn-pause" class="btn btn-ghost">⏸ Pause</button>
            <button id="btn-reset" class="btn btn-danger">↺ Reset DB</button>
        </div>
      </section>

      <!-- AI Mind Panel -->
      <section class="panel panel-mind">
        <div class="panel-title">🧠 AI Mind</div>
        <div class="panel-hint">Current Action Probabilities</div>
        <div id="mind-stats">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Event Journal -->
      <section class="panel panel-journal">
        <div class="panel-title">📓 Event Journal</div>
        <div id="event-journal">
          <div class="journal-entry">Simulation started.</div>
        </div>
      </section>

    </aside>
  </div>
</div>

<!-- JS files (loaded sequentially, no ES6 modules to support local file:// access) -->
<script src="js/events.js"></script>
<script src="js/person.js"></script>
<script src="js/world.js"></script>
<script src="js/nn.js"></script>
<script src="js/trainer.js"></script>
<script src="js/renderer.js"></script>
<script src="js/interaction.js"></script>
<script src="js/main.js"></script>

</body>
</html>
